name: Release

# Builds the desktop packages for every platform and publishes them to a draft
# GitHub Release. Trigger it either by pushing a version tag:
#
#     git tag v1.2.3 && git push origin v1.2.3
#
# or manually from the Actions tab (workflow_dispatch), supplying the version.
# The release is created as a draft so you can review notes and assets before
# publishing.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix (e.g. 1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::'$version' is not a valid semver version"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved release version: $version"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            triple: x86_64-unknown-linux-gnu
            goos: linux
            goarch: amd64
            args: ""
          - platform: windows-latest
            triple: x86_64-pc-windows-msvc
            goos: windows
            goarch: amd64
            ext: ".exe"
            args: ""
          - platform: macos-latest
            triple: aarch64-apple-darwin
            goos: darwin
            goarch: arm64
            args: "--target aarch64-apple-darwin"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libsoup-3.0-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            build-essential pkg-config

      - uses: actions/setup-go@v5
        with:
          go-version-file: amtd/go.mod
          cache-dependency-path: amtd/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri -> target

      - name: Stamp release version
        shell: bash
        run: node scripts/set-version.mjs "${{ needs.prepare.outputs.version }}"

      - name: Build amtd sidecar
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p app/src-tauri/binaries
          out="app/src-tauri/binaries/amtd-${{ matrix.triple }}${{ matrix.ext }}"
          ( cd amtd && go build \
              -ldflags "-s -w -X main.Version=${{ needs.prepare.outputs.version }}" \
              -o "../$out" . )

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build and publish desktop bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          # Force npm so the action never auto-picks bun, which is preinstalled
          # on the macOS runners and crashes on the tauri CLI entry point
          # ("unsettled top-level await"). Our deps are installed with npm ci.
          tauriScript: npm run tauri
          tagName: v${{ needs.prepare.outputs.version }}
          releaseName: MeshManager v${{ needs.prepare.outputs.version }}
          releaseBody: |
            MeshManager v${{ needs.prepare.outputs.version }}

            Desktop packages are attached below.

            - Windows: `-setup.exe` (NSIS installer), `.msi`, or the portable `.zip` (extract and run, no install)
            - Linux: `.deb`, `.rpm`, or `.AppImage` (portable)
            - macOS: `.dmg` (Apple Silicon `aarch64`)

            Installers are unsigned. Windows SmartScreen and macOS Gatekeeper will
            warn on first run.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # tauri-action only publishes the installers (NSIS/MSI). Ship a portable
      # ZIP too: the main exe plus the amtd sidecar it spawns at runtime, in the
      # same layout target/release already uses (so the exe finds the sidecar).
      - name: Attach portable Windows zip
        if: matrix.goos == 'windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $rel = "app/src-tauri/target/release"
          Write-Host "Top-level of ${rel}:"
          Get-ChildItem $rel -File | Select-Object Name, Length | Format-Table | Out-String | Write-Host
          New-Item -ItemType Directory -Force portable | Out-Null

          # Main executable (anything that isn't the amtd sidecar) plus any
          # runtime DLLs that sit next to it.
          $main = Get-ChildItem $rel -File -Filter *.exe |
            Where-Object { $_.BaseName -notlike 'amtd*' } | Select-Object -First 1
          if (-not $main) { Write-Error "main exe not found in $rel"; exit 1 }
          Copy-Item $main.FullName portable
          Get-ChildItem $rel -File -Filter *.dll | ForEach-Object { Copy-Item $_.FullName portable }

          # The amtd sidecar: Tauri stages it beside the release binary as
          # amtd.exe (the name the app resolves at runtime). Fall back to the
          # binary we built if it isn't there. Always emit it as amtd.exe.
          $sc = Get-ChildItem $rel -File -Filter 'amtd*.exe' | Select-Object -First 1
          if (-not $sc) {
            $sc = Get-ChildItem "app/src-tauri/binaries" -File -Filter 'amtd-*.exe' | Select-Object -First 1
          }
          if (-not $sc) { Write-Error "amtd sidecar not found"; exit 1 }
          Copy-Item $sc.FullName (Join-Path portable "amtd.exe")

          $version = "${{ needs.prepare.outputs.version }}"
          $dest = "MeshManager_${version}_x64-portable.zip"
          Compress-Archive -Path "portable/*" -DestinationPath $dest -Force
          gh release upload "v$version" $dest --clobber
